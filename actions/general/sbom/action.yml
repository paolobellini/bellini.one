name: sbom
description: generate a cyclonedx sbom with trivy and upload it to dependency-track

inputs:
  project-name:
    description: dependency-track project name
    required: true
  parent:
    description: dependency-track parent project uuid
    required: false
    default: ''
  server-hostname:
    description: dependency-track server hostname (pass a secret)
    required: true
  api-key:
    description: dependency-track api key (pass a secret)
    required: true

runs:
  using: composite
  steps:
    - name: generate cyclonedx sbom
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: 'fs'
        scan-ref: .
        format: 'cyclonedx'
        output: 'bom.cdx.json'

    - name: derive release version
      id: ver
      shell: bash
      run: echo "v=v$(grep -m1 '## \[' CHANGELOG.md | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')" >> "$GITHUB_OUTPUT"

    - name: send sbom to dependency-track
      uses: DependencyTrack/gh-upload-sbom@v3
      with:
        serverHostname: ${{ inputs.server-hostname }}
        apiKey: ${{ inputs.api-key }}
        projectName: ${{ inputs.project-name }}
        projectVersion: ${{ steps.ver.outputs.v }}
        autoCreate: true
        isLatest: true
        bomFilename: bom.cdx.json
        parent: ${{ inputs.parent }}
